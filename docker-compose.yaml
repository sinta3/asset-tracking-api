version: '3.8'

services:
  app:
    build: .
    container_name: asset_tracking_app
    ports:
      - '${PORT}:3000'
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mysql_test:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - asset_network

  mysql:
    image: mysql:8.4
    container_name: asset_tracking_mysql
    ports:
      - '${DB_PORT}:3306'
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          '${DB_USER}',
          '-p${DB_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset_network

  mysql_test:
    image: mysql:8.4
    container_name: asset_tracking_mysql_test
    ports:
      - '${DB_TEST_PORT}:3306'
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_TEST_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./docker/init.test.sql:/docker-entrypoint-initdb.d/01-init.test.sql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          '${DB_USER}',
          '-p${DB_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset_network

volumes:
  mysql_data:

networks:
  asset_network:
    driver: bridge
